<!DOCTYPE html>
<html>
<head>
  <title>Certificados</title>
  <meta charset="UTF-8">
</head>
<body style="background:#0d1117; color:white; text-align:center; font-family:Arial;">

  <h1>Meus Certificados</h1>

  <!-- BOTÕES -->
  <button onclick="mostrar('sophos')" style="padding:10px 20px; margin:10px;">Sophos</button>
  <button onclick="mostrar('watchguard')" style="padding:10px 20px; margin:10px;">WatchGuard</button>

  <hr>

  <!-- CONTEÚDO SOPHOS -->
  <div id="sophos" style="display:none;">

    <h2>AT80 - Sophos Firewall Architect</h2>
    <iframe src="AT80.pdf" width="80%" height="500px"></iframe>

    <br><br>

    <h2>ET80 - Sophos Firewall Engineer</h2>
    <iframe src="ET80.pdf" width="80%" height="500px"></iframe>

    <br><br>

    <h2>EU80 - Sophos Endpoint Architect</h2>
    <iframe src="EU80.pdf" width="80%" height="500px"></iframe>

  </div>

  <!-- CONTEÚDO WATCHGUARD -->
  <div id="watchguard" style="display:none;">
    <h2>Certificados WatchGuard</h2>
    <p>Adicione aqui seus certificados</p>
  </div>

  <!-- SCRIPT -->
  <script>
    function mostrar(secao) {
      document.getElementById('sophos').style.display = 'none';
      document.getElementById('watchguard').style.display = 'none';

      document.getElementById(secao).style.display = 'block';
    }
  </script>

</body>
</html>
